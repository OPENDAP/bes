
BES.modules+=ngap
BES.module.ngap=/Users/jimg/src/opendap/hyrax/bes/modules/ngap/.libs/libngap_module.so

BES.modules+=h5
BES.module.h5=/Users/jimg/src/opendap/hyrax/bes/modules/hdf5_handler/.libs/libhdf5_module.so
BES.Catalog.catalog.TypeMatch+=h5:.*\.(HDF5|h5|he5)(\.bz2|\.gz|\.Z)?$;

BES.modules+=dmrpp
BES.module.dmrpp=/Users/jimg/src/opendap/hyrax/bes/modules/dmrpp/libdmrpp_module.so
BES.Catalog.catalog.TypeMatch+=dmrpp:.*\.dmrpp(\.bz2|\.gz|\.Z)?$;

BES.Catalog.catalog.RootDirectory=/Users/jimg/src/opendap/hyrax/bes/modules/ngap_module

BES.LogName=/dev/null

AllowedHosts = ^https:\/\/cmr\.(uat\.|sit\.)?earthdata\.nasa\.gov\/.*$

NGAP.inject_data_urls = true

# These are here for unit tests that change these values; the bes.conf file
# does not list these so that we can test the defaults compiled into the code.
# jhrg 9/28/23

NGAP.UseCMRCache = true
NGAP.UseDMRppCache = true

NGAP.CMRCacheSize.Items = 100
NGAP.CMRCachePurge.Items = 20
NGAP.DMRppCacheSize.Items = 100
NGAP.DMRppCachePurge.Items = 20
NGAP.DMRppFileCacheSize.MB = 10000
NGAP.DMRppFileCachePurge.MB = 2000
NGAP.DMRppFileCacheDir = /tmp
